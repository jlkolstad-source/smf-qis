[build]
  publish = "public"
  functions = "netlify/functions"
  environment = { NODE_VERSION = "20" }

[functions]
  node_bundler = "esbuild"

[functions."generate-report"]
  timeout = 26

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/api/generate-report"
  to = "/.netlify/functions/generate-report"
  status = 200

[[redirects]]
  from = "/api/audits"
  to = "/.netlify/functions/audits"
  status = 200

[[redirects]]
  from = "/api/capa-links"
  to = "/.netlify/functions/capa-links"
  status = 200

[[redirects]]
  from = "/api/recall"
  to = "/.netlify/functions/recall"
  status = 200

[[redirects]]
  from = "/api/culture-survey"
  to = "/.netlify/functions/culture-survey"
  status = 200

[[redirects]]
  from = "/api/receiving"
  to = "/.netlify/functions/receiving"
  status = 200

[[redirects]]
  from = "/api/user-roles"
  to = "/.netlify/functions/user-roles"
  status = 200
